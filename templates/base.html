<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}CTI Platform{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/dashboard.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg border-bottom sticky-top dashboard-nav">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="/">CTI Platform</a>
            <span class="navbar-text text-secondary">Known exploited vulnerability intelligence dashboard</span>
        </div>
    </nav>

    <main class="container-fluid px-4 py-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
<a href="/">Dashboard</a>
<a href="/analytics">Analytics</a>
<a href="/campaigns">Campaigns</a>
<a href="/feed">Intel Feed</a>
<a href="/api/reports" target="_blank">API</a>
